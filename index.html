<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="favicon.png?v=2026">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihat Keleş | Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            padding: 1rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header {
            background: #2a2a2a;
            padding: 1.5rem 2rem;
            border-bottom: 3px solid #f5b042;
        }
        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 2rem;
        }
        .header-logo { width: 180px; height: auto; border-radius: 10px; }
        header h1 { font-size: 2rem; letter-spacing: 1px; margin: 0; }
        header h1 span { color: #f5b042; }
        
        nav ul { display: flex; flex-wrap: wrap; gap: 0.6rem; list-style: none; }
        nav button {
            background: #333;
            border: none;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        nav button.active, nav button:hover { background: #f5b042; color: #1e1e1e; }

        main { padding: 2.5rem; min-height: 55vh; }
        .content-body h2 {
            color: #f5b042;
            border-left: 5px solid #f5b042;
            padding-left: 1rem;
            margin: 1.5rem 0 1rem;
            text-transform: uppercase;
        }
        .content-body h3 { 
            color: #f5b042; 
            margin: 1.5rem 0 0.8rem; 
            border-bottom: 1px solid #333; 
            padding-bottom: 5px; 
        }
        .content-body p { margin-bottom: 1.2rem; color: #ccc; text-align: justify; }
        .content-body ul { margin-left: 1.5rem; margin-bottom: 1.5rem; color: #ccc; }
        .content-body li { margin-bottom: 0.7rem; }
        
        details.accordion { background: #252525; margin: 1rem 0; border-radius: 12px; border: 1px solid #3a3a3a; }
        details.accordion summary { padding: 1.2rem; cursor: pointer; font-weight: bold; color: #f5b042; list-style: none; display: flex; justify-content: space-between; }
        details.accordion summary::after { content: "▼"; font-size: 0.8rem; opacity: 0.7; }
        details.accordion[open] summary::after { content: "▲"; }
        .accordion-inner { padding: 1.5rem; border-top: 1px solid #3a3a3a; background: #1e1e1e; }
        
        .contact-link { color: #f5b042; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 2rem; background: #2a2a2a; color: #666; font-size: 0.8rem; }

        @media (max-width: 700px) {
            .header-brand { flex-direction: column; text-align: center; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-brand">
            <h1>NİHAT <span>KELEŞ</span></h1>
            <img src="logo.png" alt="Logo" class="header-logo">
        </div>
        <nav><ul id="nav-list"></ul></nav>
    </header>
    <main id="page-content" class="content-body"></main>
    <footer>&copy; 2026 Nihat Keleş</footer>
</div>

<script>
    const siteData = {
        anasayfa: `
            <h2>HAKKINDA</h2>
            <p><strong>Yazar / Çocuk Gelişimi Temelli Oluşturucu Drama Uzmanı</strong></p>
            
            <h3>Yazarlık Üzerine...</h3>
            <p>Kamu kurumları, sahne ve ekran için metin üretir. Oyunları Devlet Tiyatroları repertuvarında yer almıştır. Epsilon Yayınevi yazarıdır.</p>
            
            <h3>Eğitim Üzerine...</h3>
            <p>20 yılın üzerinde ilkokul düzeyinde uygulamalı drama ve çocuk tiyatrosu disiplinlerini yürütüyor. On binin üzerinde çocukla sahne deneyimi paylaşırken; tiyatro dilini çocuk gelişimi perspektifiyle birleştiren bir metodoloji geliştirdi. Akademik çalışmalarını; çocuk merkezli yapılandırılmış atölyeler ve okul programlarıyla sahaya aktarmaya devam ediyor.</p>
            
            <h3>Sahne Üzerine...</h3>
            <p>Sahne kökenli bir drama eğitmeni olarak, profesyonel tiyatro deneyimimi sınıf ortamına taşıyorum. Devlet ve özel tiyatrolarda aktif oyunculuk geçmişim, uygulamalı ve disiplinli bir eğitim modeli sunmamı sağlar.</p>
        `,
        yazarlik: `
            <h2>YAZARLIK & DRAMATURJİ</h2>
            <p><em>"Sadece kağıt üzerinde kalan değil, sahne ışığıyla veya kamera vizörüyle buluştuğunda yaşayan metinler üzerine odaklanıyorum."</em></p>
            
            <h3>Üretim Alanları</h3>
            <ul>
                <li><strong>Dramatik Yazarlık:</strong> Devlet Tiyatroları repertuvarına kabul edilmiş oyunlar ve çocuk müzikalleri.</li>
                <li><strong>Ekran Metinleri:</strong> Televizyon dizileri, sinema filmleri ve reklam senaryoları için dramaturjik kurgu ve yazım.</li>
                <li><strong>Edebiyat:</strong> Gençlik ve Çocuk Romanları.</li>
                <li><strong>Kurumsal Yazarlık:</strong> Kamu kurumları ve özel teşebbüsler için stratejik metin üretimi ve editörlük.</li>
            </ul>
            
            <h3>Yazım Yaklaşımı</h3>
            <ul>
                <li><strong>Uygulanabilirlik:</strong> Sahne veya çekim matematiğine uygun, teknik olarak uygulanabilir kurgular.</li>
                <li><strong>Hedef Kitle Algısı:</strong> Çocuk oyununda pedagojik hassasiyet, reklamda pazarlama dili, dramada ise karakter derinliği.</li>
                <li><strong>Dinamik Dil:</strong> Bilgi kaosundan uzak, akıcı ve izleyiciyi/okuru hikayenin içinde tutan yalın bir anlatım.</li>
            </ul>
            
            <h3>Öne Çıkan Deneyimler</h3>
            <ul>
                <li><strong>Devlet Tiyatroları:</strong> 60. yıla özel çocuk oyunlarından birine editöryal destek. Repertuvara kazandırılan oyunlar. Müzikal Çocuk Oyunu.</li>
                <li><strong>Bakanlıklar & Kurumlar:</strong> Kültür Bakanlığı / Dış İşleri Bakanlığı / Türk Tarih Kurumu için senaryo geliştirme destekleri ve kamu projeleri metin yazarlığı.</li>
                <li><strong>Medya & Editörlük:</strong> Ulusal kanallarda ve yapım firmalarında senaryo danışmanlığı ve içerik yönetimi.</li>
            </ul>
        `,
        sahne: `
            <h2>SAHNE</h2>
            <p>Sahne kökenli bir drama eğitmeni olarak, profesyonel tiyatro deneyimimi sınıf ortamına taşıyorum. Devlet ve özel tiyatrolarda aktif oyunculuk geçmişim, uygulamalı ve disiplinli bir eğitim modeli sunmamı sağlar.</p>
            <p>Sahne disiplini ve kolektif üretim gücüyle şekillenen bir eğitmenlik vizyonu. Profesyonel tiyatro deneyiminin eğitimle buluştuğu noktada, sahne sanatlarının disiplini çocuk gelişiminin en büyük destekçisidir.</p>
        `,
        iletisim: `
            <h2>İLETİŞİM</h2>
            <p><strong>Telefon:</strong> +90 530 558 86 50</p>
            <p><strong>Instagram:</strong> <a href="https://www.instagram.com/dramahocam/" target="_blank" class="contact-link">@dramahocam</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/nihat-keles-b3492523" target="_blank" class="contact-link">Nihat KELEŞ | LinkedIn</a></p>
        `
    };

    const dramaData = [
        {
            baslik: "🔍 Çalışma Modelim",
            icerik: `
                <h3>Çocuk Gelişimi Odaklı Yaratıcı Drama</h3>
                <p>İlkokul düzeyinde, çocuk gelişimi ilkelerini temel alan yapılandırılmış yaratıcı drama çalışmaları yürütüyorum. <strong>Temel amacım; çocuğun ifade gücünü, sosyal uyum becerisini ve eleştirel düşünme yetisini sahne pratiğiyle somutlaştırmaktır.</strong></p>
                <h3>Nasıl Çalışıyorum?</h3>
                <p>Eğitimler, akademik bir metodolojiye dayanan ve sınıf içi dinamiklere tam uyum sağlayan bir sistem üzerine kurulur:</p>
                <ul>
                    <li><strong>Oyunlaştırılmış Öğrenme:</strong> Bilgiyi ezberden çıkarıp deneyime dönüştürme.</li>
                    <li><strong>Etkileşimli Rol Alma:</strong> Grup içi iş birliği ve empati geliştirme.</li>
                    <li><strong>Duygusal Zeka (EQ):</strong> Duygu yönetimi ve özgüven odaklı uygulamalar.</li>
                </ul>
            `
        },
        {
            baslik: "📖 Uygulama Modeli",
            icerik: `
                <p>Çeyrek asırlık saha deneyimiyle rafine edilen bu yaklaşım üç ana sütuna dayanır:</p>
                <ul>
                    <li><strong>Disiplinlerarası Geçiş:</strong> Tiyatro pratiğinin çocuk gelişimi pedagojisiyle eş zamanlı kullanımı.</li>
                    <li><strong>Yapılandırılmış Kurgu:</strong> Sınıf ortamına özel, müfredatla uyumlu drama senaryoları.</li>
                    <li><strong>İletişim Becerileri:</strong> Hitabet, artikülasyon ve diksiyon çalışmalarının drama sürecine doğal entegrasyonu.</li>
                </ul>
            `
        },
        {
            baslik: "🏫 Hizmet Alanları",
            icerik: `
                <ul>
                    <li><strong>Kurumlar:</strong> İlkokullar, anaokulları ve butik eğitim merkezleri.</li>
                    <li><strong>Eğitimciler:</strong> Öğretmen eğitimleri ve eğitim koordinatörlüğü danışmanlığı.</li>
                    <li><strong>Projeler:</strong> Okul içi program tasarımı ve çocuk müzikali/tiyatrosu prodüksiyonları.</li>
                </ul>
            `
        }
    ];

    let currentPage = "anasayfa";

    function render() {
        const contentArea = document.getElementById("page-content");
        const navList = document.getElementById("nav-list");
        const menuler = [
            {id: "anasayfa", ad: "ANA SAYFA"},
            {id: "drama", ad: "DRAMA HOCAM"},
            {id: "yazarlik", ad: "YAZARLIK"},
            {id: "sahne", ad: "SAHNE"},
            {id: "iletisim", ad: "İLETİŞİM"}
        ];

        navList.innerHTML = "";
        menuler.forEach(m => {
            const btn = document.createElement("button");
            btn.textContent = m.ad;
            if(currentPage === m.id) btn.classList.add("active");
            btn.onclick = () => { currentPage = m.id; render(); };
            navList.appendChild(btn);
        });

        if (currentPage === "drama") {
            let html = "<h2>DRAMA HOCAM</h2>";
            dramaData.forEach(item => {
                html += `
                    <details class="accordion">
                        <summary>${item.baslik}</summary>
                        <div class="accordion-inner">${item.icerik}</div>
                    </details>`;
            });
            contentArea.innerHTML = html;
        } else {
            contentArea.innerHTML = siteData[currentPage] || "İçerik yükleniyor...";
        }
        window.scrollTo(0,0);
    }
    render();
</script>
</body>
</html>
