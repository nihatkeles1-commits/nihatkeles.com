<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="favicon.png?v=2026">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihat Keleş | Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            padding: 1rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header {
            background: #2a2a2a;
            padding: 1.5rem 2rem;
            border-bottom: 3px solid #f5b042;
        }
        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 2rem;
        }
        .header-logo { width: 180px; height: auto; border-radius: 10px; }
        header h1 { font-size: 2rem; letter-spacing: 1px; margin: 0; }
        header h1 span { color: #f5b042; }
        
        nav ul { display: flex; flex-wrap: wrap; gap: 0.6rem; list-style: none; }
        nav button {
            background: #333;
            border: none;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        nav button.active, nav button:hover { background: #f5b042; color: #1e1e1e; }

        main { padding: 2.5rem; min-height: 55vh; }
        .content-body h2 {
            color: #f5b042;
            border-left: 5px solid #f5b042;
            padding-left: 1rem;
            margin: 1.5rem 0 1rem;
        }
        .content-body h3 { 
            color: #f5b042; 
            margin: 1.5rem 0 0.8rem; 
            border-bottom: 1px solid #333; 
            padding-bottom: 5px; 
        }
        .content-body p { margin-bottom: 1.2rem; color: #ccc; text-align: justify; }
        .content-body ul { margin-left: 1.5rem; margin-bottom: 1.5rem; color: #ccc; }
        .content-body li { margin-bottom: 0.7rem; }
        
        details.accordion { background: #252525; margin: 1rem 0; border-radius: 12px; border: 1px solid #3a3a3a; }
        details.accordion summary { padding: 1.2rem; cursor: pointer; font-weight: bold; color: #f5b042; list-style: none; display: flex; justify-content: space-between; }
        details.accordion summary::after { content: "▼"; font-size: 0.8rem; opacity: 0.7; }
        details.accordion[open] summary::after { content: "▲"; }
        .accordion-inner { padding: 1.5rem; border-top: 1px solid #3a3a3a; background: #1e1e1e; }
        
        .contact-link { color: #f5b042; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 2rem; background: #2a2a2a; color: #666; font-size: 0.8rem; }

        @media (max-width: 700px) {
            .header-brand { flex-direction: column; text-align: center; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-brand">
            <h1>NİHAT <span>KELEŞ</span></h1>
            <img src="logo.png" alt="Logo" class="header-logo">
        </div>
        <nav><ul id="nav-list"></ul></nav>
    </header>
    <main id="page-content" class="content-body"></main>
    <footer>&copy; 2026 Nihat Keleş</footer>
</div>

<script>
    const siteData = {
        anasayfa: `
            <h2>HAKKINDA</h2>
            <p><strong>Yazar / Çocuk Gelişimi Temelli Oluşturucu Drama Uzmanı</strong></p>
            <h3>Yazarlık Yolculuğum</h3>
            <p>Kamu kurumları, sahne ve ekran için metinler üretiyorum. Oyunlarımla Devlet Tiyatroları repertuvarında yer alıyorum. Epsilon Yayınevi bünyesinde yazarlık çalışmalarıma devam ediyorum.</p>
            <h3>Eğitim Yaklaşımım</h3>
            <p>İlkokul düzeyinde uygulamalı drama ve çocuk tiyatrosu disiplinlerini yürütüyorum. Tiyatro dilini çocuk gelişimi perspektifiyle birleştiren özgün bir metodoloji kullanıyorum. Akademik çalışmalarımı; çocuk merkezli yapılandırılmış atölyeler ve okul programlarıyla sahaya aktarmayı sürdürüyorum.</p>
            <h3>Sahnede Olmak</h3>
            <p>Sahne kökenli bir drama eğitmeni olarak, profesyonel tiyatro deneyimimi sınıf ortamına taşıyorum. Devlet ve özel tiyatrolardaki aktif oyunculuk geçmişimle, uygulamalı bir eğitim modeli sunuyorum.</p>
        `,
        yazarlik: `
            <h2>YAZARLIK & DRAMATURJİ</h2>
            <p><strong>Hikaye Tasarımından Sahne Uygulamasına</strong></p>
            <p><em>"Sadece kağıt üzerinde kalan değil, sahne ışığıyla veya kamera vizörüyle buluştuğunda yaşayan metinler üzerine odaklanıyorum."</em></p>
            <h3>Üretim Alanlarım</h3>
            <ul>
                <li><strong>Dramatik Yazarlık:</strong> Devlet Tiyatroları repertuvarına kabul edilen oyunlar ve çocuk müzikalleri yazıyorum.</li>
                <li><strong>Ekran Metinleri:</strong> Televizyon dizileri, sinema filmleri ve reklam senaryoları için dramaturjik kurgu ve yazım süreçlerini yönetiyorum.</li>
                <li><strong>Edebiyat:</strong> Gençlik ve çocuk romanları üzerine çalışıyorum.</li>
                <li><strong>Kurumsal Yazarlık:</strong> Kamu kurumları için stratejik metinler üretiyor ve editörlük yapıyorum.</li>
            </ul>
            <h3>Yazım Prensiplerim</h3>
            <ul>
                <li><strong>Uygulanabilirlik:</strong> Sahne veya çekim matematiğine uygun kurgular oluşturuyorum.</li>
                <li><strong>Hedef Kitle Algısı:</strong> Çocuk oyununda pedagojik hassasiyeti, reklamda pazarlama dilini temel alıyorum.</li>
                <li><strong>Dinamik Dil:</strong> Bilgi kaosundan uzak, akıcı ve yalın bir anlatım kullanıyorum.</li>
            </ul>
            <h3>Kurumsal Deneyimlerim</h3>
            <p>Devlet Tiyatroları, Bakanlıklar ve yapım firmaları ile senaryo geliştirme ve içerik yönetimi süreçlerinde, gerektiğinde projelerde yer alıyor ve destek sunuyorum.</p>
        `,
        sahne: `
            <h2>SAHNE DİSİPLİNLERİ</h2>
            <p>Profesyonel tiyatro deneyimimi sınıf ortamına taşıyorum. Devlet ve özel tiyatrolardaki aktif oyunculuk geçmişimle, öğrencilerime uygulamalı ve disiplinli bir eğitim modeli sunuyorum.</p>
            <p>Sahne sanatlarının disiplinini, çocuk gelişiminin en büyük destekçisi olarak konumlandırıyorum.</p>
        `,
        iletisim: `
            <h2>İLETİŞİM</h2>
            <p><strong>Telefon:</strong> +90 530 558 86 50</p>
            <p><strong>Instagram:</strong> <a href="https://www.instagram.com/dramahocam/" target="_blank" class="contact-link">@dramahocam</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/nihat-keles-b3492523/" target="_blank" class="contact-link">Nihat KELEŞ | LinkedIn</a></p>
        `
    };

    const dramaData = [
        {
            baslik: "🔍 Çalışma Modelim",
            icerik: `
                <h3>Çocuk Gelişimi Odaklı Yaratıcı Drama</h3>
                <p>İlkokul düzeyinde, çocuk gelişimi ilkelerini temel alan yapılandırılmış yaratıcı drama çalışmaları yürütüyorum.</p>
                <ul>
                    <li><strong>Oyunlaştırılmış Öğrenme:</strong> Bilgiyi deneyime dönüştürüyorum.</li>
                    <li><strong>Etkileşimli Rol Alma:</strong> İş birliğini ve empatiyi geliştiriyorum.</li>
                    <li><strong>Duygusal Zeka (EQ):</strong> Özgüven odaklı uygulamalar yapıyorum.</li>
                </ul>
            `
        },
        {
            baslik: "📖 Uygulama Modeli",
            icerik: `
                <ul>
                    <li><strong>Disiplinlerarası Geçiş:</strong> Tiyatro pratiğini çocuk gelişimi pedagojisiyle eş zamanlı kullanıyorum.</li>
                    <li><strong>Yapılandırılmış Kurgu:</strong> Müfredatla uyumlu drama senaryoları hazırlıyorum.</li>
                    <li><strong>İletişim Becerileri:</strong> Hitabet ve diksiyon çalışmalarını sürece entegre ediyorum.</li>
                </ul>
            `
        },
        {
            baslik: "🏫 İş Birliği Alanları & Saha Çalışmaları",
            icerik: `
                <ul>
                    <li><strong>Eğitim Programlama:</strong> Okul öncesi ve ilköğretim düzeyinde, disiplinler arası programlar geliştiriyor; okullarda uygulama süreçlerini bizzat yürütüyorum.</li>
                    <li><strong>Eğitimci Gelişimi:</strong> Öğretmenler için drama teknikleri eğitimleri düzenliyorum.</li>
                    <li><strong>Kurumsal Destek:</strong> Devlet Tiyatroları ve Bakanlık projelerinde senaryo geliştirme ve içerik yönetimi süreçlerinde destek sunuyorum.</li>
                </ul>
            `
        },
        {
            baslik: "🎬 Süreç Anlatımları",
            icerik: `
                <p>Yaratıcı drama süreçlerini ve atölye metodolojimi animasyon destekli videolarla anlatıyor; eğitimin dijital dille buluşmasını sağlıyorum.</p>
            `
        }
    ];

    let currentPage = "anasayfa";

    function render() {
        const contentArea = document.getElementById("page-content");
        const navList = document.getElementById("nav-list");
        const menuler = [
            {id: "anasayfa", ad: "ANA SAYFA"},
            {id: "drama", ad: "DRAMA HOCAM"},
            {id: "yazarlik", ad: "YAZARLIK"},
            {id: "sahne", ad: "SAHNE"},
            {id: "iletisim", ad: "İLETİŞİM"}
        ];

        navList.innerHTML = "";
        menuler.forEach(m => {
            const btn = document.createElement("button");
            btn.textContent = m.ad;
            if(currentPage === m.id) btn.classList.add("active");
            btn.onclick = () => { currentPage = m.id; render(); };
            navList.appendChild(btn);
        });

        if (currentPage === "drama") {
            let html = "<h2>DRAMA HOCAM</h2>";
            dramaData.forEach(item => {
                html += `
                    <details class="accordion">
                        <summary>${item.baslik}</summary>
                        <div class="accordion-inner">${item.icerik}</div>
                    </details>`;
            });
            contentArea.innerHTML = html;
        } else {
            contentArea.innerHTML = siteData[currentPage] || "İçerik yükleniyor...";
        }
        window.scrollTo(0,0);
    }
    render();
</script>
</body>
</html>
