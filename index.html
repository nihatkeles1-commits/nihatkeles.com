<script>
(function() { localStorage.removeItem('site_data');
localStorage.removeItem('yazim_atolyesi_data');
    // SHA-256
    function sha256(str) {
        function rotateRight(v, n) { return (v >>> n) | (v << (32 - n)); }
        function stringToUint8Array(s) {
            const arr = [];
            for (let i = 0; i < s.length; i++) {
                const c = s.charCodeAt(i);
                if (c < 0x80) arr.push(c);
                else if (c < 0x800) { arr.push(0xc0 | (c >> 6)); arr.push(0x80 | (c & 0x3f)); }
                else if (c < 0xd800 || c >= 0xe000) {
                    arr.push(0xe0 | (c >> 12)); arr.push(0x80 | ((c >> 6) & 0x3f)); arr.push(0x80 | (c & 0x3f));
                } else {
                    i++;
                    const u16 = 0x10000 + (((c & 0x3ff) << 10) | (s.charCodeAt(i) & 0x3ff));
                    arr.push(0xf0 | (u16 >> 18)); arr.push(0x80 | ((u16 >> 12) & 0x3f));
                    arr.push(0x80 | ((u16 >> 6) & 0x3f)); arr.push(0x80 | (u16 & 0x3f));
                }
            }
            return arr;
        }
        const bytes = stringToUint8Array(str);
        const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
                    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
                    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
                    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
                    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
                    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
                    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
                    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
        let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
        const l = bytes.length * 8;
        bytes.push(0x80);
        while ((bytes.length * 8) % 512 !== 448) bytes.push(0);
        const lenArr = new Uint8Array(8);
        for (let i = 0; i < 8; i++) lenArr[7-i] = (l >>> (i*8)) & 0xff;
        bytes.push(...lenArr);
        for (let i = 0; i < bytes.length; i += 64) {
            const w = new Array(64);
            for (let t = 0; t < 16; t++) {
                const off = i + t*4;
                w[t] = (bytes[off]<<24) | (bytes[off+1]<<16) | (bytes[off+2]<<8) | bytes[off+3];
            }
            for (let t = 16; t < 64; t++) {
                const s0 = rotateRight(w[t-15],7) ^ rotateRight(w[t-15],18) ^ (w[t-15]>>>3);
                const s1 = rotateRight(w[t-2],17) ^ rotateRight(w[t-2],19) ^ (w[t-2]>>>10);
                w[t] = (w[t-16] + s0 + w[t-7] + s1) | 0;
            }
            let [a,b,c,d,e,f,g,h] = H;
            for (let t = 0; t < 64; t++) {
                const S1 = rotateRight(e,6) ^ rotateRight(e,11) ^ rotateRight(e,25);
                const ch = (e & f) ^ ((~e) & g);
                const temp1 = (h + S1 + ch + K[t] + w[t]) | 0;
                const S0 = rotateRight(a,2) ^ rotateRight(a,13) ^ rotateRight(a,22);
                const maj = (a & b) ^ (a & c) ^ (b & c);
                const temp2 = (S0 + maj) | 0;
                h = g; g = f; f = e; e = (d + temp1) | 0;
                d = c; c = b; b = a; a = (temp1 + temp2) | 0;
            }
            H[0] = (H[0] + a) | 0; H[1] = (H[1] + b) | 0; H[2] = (H[2] + c) | 0; H[3] = (H[3] + d) | 0;
            H[4] = (H[4] + e) | 0; H[5] = (H[5] + f) | 0; H[6] = (H[6] + g) | 0; H[7] = (H[7] + h) | 0;
        }
        return H.map(x => x.toString(16).padStart(8,'0')).join('');
    }

    const DEFAULT_HASH = sha256("set32lot74.");
    function getSavedHash() { return localStorage.getItem("admin_password_hash") || DEFAULT_HASH; }
    function setNewPassword(pass) { localStorage.setItem("admin_password_hash", sha256(pass)); }
    function checkPassword(pass) { return sha256(pass) === getSavedHash(); }

        drama: `<h2>DRAMA HOCAM</h2><div id="dynamic-drama-content"></div>`,
        yazarlik: `<h2>YAZARLIK</h2>
                   <p><strong>Hikaye Tasarımından Sahne Uygulamasına</strong></p>
                   <p><em>“Sadece kağıt üzerinde kalan değil, sahne ışığıyla veya kamera vizörüyle buluştuğunda yaşayan metinler üzerine odaklanıyorum.”</em></p>
                   <h3>Üretim Alanları</h3>

        sahne: `<h2>SAHNE</h2><p>Sahne disiplini ve kolektif üretim gücüyle şekillenen bir eğitmenlik vizyonu.</p>`,

    function changeLogo() { const input = document.getElementById('logoFileInput'); input.click(); input.onchange = e => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = ev => { document.getElementById('siteLogo').src = ev.target.result; localStorage.setItem('site_logo_src', ev.target.result); alert('Logo güncellendi!'); }; r.readAsDataURL(file); }; }

    function loadDramaData() { const saved = localStorage.getItem("nihatkeles_drama"); if (saved) { try { Object.assign(dramaData, JSON.parse(saved)); } catch(e) {} } }
    function saveDramaData() { localStorage.setItem("nihatkeles_drama", JSON.stringify(dramaData)); }

    function saveData(silent) { localStorage.setItem("nihatkeles_simple", JSON.stringify({contents:siteData.contents, currentPage:siteData.currentPage})); if (!silent && adminMode) alert("✅ Kaydedildi"); }

    function escapeHtml(s) { return (s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]||m); }

    function editSectionTitle(key) { const cur = dramaData.sectionTitles[key] || ''; const n = prompt("Yeni başlık:", cur); if (n && n.trim()) { dramaData.sectionTitles[key] = n.trim(); saveDramaData(); renderDramaPage(); } }

    function renderDramaPage() {
        let html = `<h2>DRAMA HOCAM</h2>`;
        const renderSection = (key, items, renderItem) => {
            const title = dramaData.sectionTitles[key] || key;
            html += `<details class="accordion" open><summary>${title} ${adminMode ? `<button class="section-title-edit" onclick="editSectionTitle('${key}');event.stopPropagation();">✏️</button>` : ''}</summary><div class="details-content">`;
            if (items.length === 0) html += `<p>Henüz öge yok.</p>`;
            else items.forEach((item, idx) => { html += renderItem(item, idx); });
            html += `</div></details>`;
        };
        renderSection('pageTexts', dramaData.pageTexts, (text, idx) => `<div style="margin-bottom:1rem;border-bottom:1px solid #333;">${text}${adminMode ? `<div><button class="inline-action-btn" onclick="deletePageText(${idx})">🗑️ Sil</button></div>` : ''}</div>`);
        renderSection('articles', dramaData.articles, (art, idx) => `<details class="inner-accordion"><summary>${escapeHtml(art.title)}</summary><div class="details-content">${art.content}</div>${adminMode ? `<div style="padding:0.5rem;"><button class="inline-action-btn" onclick="deleteArticle(${idx})">❌ Sil</button></div>` : ''}</details>`);
        renderSection('references', dramaData.references, (ref, idx) => `<details class="inner-accordion"><summary>${escapeHtml(ref.name)}</summary><div class="details-content"><p>${escapeHtml(ref.description)}</p></div>${adminMode ? `<div style="padding:0.5rem;"><button class="inline-action-btn" onclick="deleteReference(${idx})">❌ Sil</button></div>` : ''}</details>`);
        renderSection('instaVideos', dramaData.instaVideos, (vid, idx) => `<details class="inner-accordion"><summary>${escapeHtml(vid.title)}</summary><div class="details-content">${vid.embedUrl ? `<iframe src="${vid.embedUrl.replace(/"/g,'&quot;')}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>` : ''}</div>${adminMode ? `<div style="padding:0.5rem;"><button class="inline-action-btn" onclick="deleteInstaVideo(${idx})">❌ Sil</button></div>` : ''}</details>`);
        document.getElementById("dynamic-drama-content").innerHTML = html;
    }

    function addPageText() { const newHtml = prompt("Tanıtım metnini HTML formatında giriniz:", "<p>Yeni metin</p>"); if(newHtml) { dramaData.pageTexts.push(newHtml); saveDramaData(); renderDramaPage(); } }
    function deletePageText(i) { dramaData.pageTexts.splice(i,1); saveDramaData(); renderDramaPage(); }
    function addArticle() { const t = prompt("Makale Başlığı:"); if (!t) return; const c = prompt("Makale içeriği (HTML):"); if (!c) return; dramaData.articles.push({title:t.trim(), content:c.trim()}); saveDramaData(); renderDramaPage(); }
    function deleteArticle(i) { dramaData.articles.splice(i,1); saveDramaData(); renderDramaPage(); }
    function addReference() { const n = prompt("Referans Adı:"); if (!n) return; const d = prompt("Açıklama:"); if (!d) return; dramaData.references.push({name:n.trim(), description:d.trim()}); saveDramaData(); renderDramaPage(); }
    function deleteReference(i) { dramaData.references.splice(i,1); saveDramaData(); renderDramaPage(); }
    function addInstaVideo() { const t = prompt("Video Başlığı:"); if (!t) return; let u = prompt("Instagram embed linki (https://...):"); if (!u) return; u = u.trim(); dramaData.instaVideos.push({title:t.trim(), embedUrl:u}); saveDramaData(); renderDramaPage(); }
    function deleteInstaVideo(i) { dramaData.instaVideos.splice(i,1); saveDramaData(); renderDramaPage(); }

    let currentEditorTarget = '';
    function openEditor() { const pid = siteData.currentPage; currentEditorTarget = pid; const content = (pid === 'drama') ? (dramaData.pageTexts.join('<hr>')) : (siteData.contents[pid] || ''); document.getElementById('editorArea').innerHTML = content; document.getElementById('editorModal').classList.add('active'); }
    function closeEditor() { document.getElementById('editorModal').classList.remove('active'); }
    document.getElementById('saveEditorBtn').onclick = function() { const html = document.getElementById('editorArea').innerHTML; if (currentEditorTarget === 'drama') { dramaData.pageTexts = html.split('<hr>').map(s=>s.trim()).filter(s=>s); saveDramaData(); renderDramaPage(); } else { siteData.contents[currentEditorTarget] = html; saveData(); renderPage(); } closeEditor(); };
    function clearPage() { if (confirm("Tüm içerik silinecek! Onaylıyor musunuz?")) { siteData.contents[siteData.currentPage] = ""; saveData(); renderPage(); } }
    function changeAdminPassword() { const old = prompt("Eski şifre:"); if (!old || !checkPassword(old)) { alert("Eski şifre yanlış!"); return; } const nw = prompt("Yeni şifre:"); if (nw && nw.trim()) { setNewPassword(nw.trim()); alert("Şifre değişti. Tekrar giriş yapın."); adminMode = false; renderPage(); } }

    function renderPage() {
        const pid = siteData.currentPage;
        document.getElementById("page-title").innerHTML = `<h2>${pages.find(p=>p.id===pid).title}</h2>`;
        if (pid === "drama") { document.getElementById("page-content").innerHTML = `<div id="dynamic-drama-content"></div>`; renderDramaPage(); }
        else { document.getElementById("page-content").innerHTML = siteData.contents[pid] || ''; }

        const adiv = document.getElementById("admin-panel");
        if (adminMode) {
            let btns = `<div class="admin-buttons">
                <button class="admin-btn" id="changeLogoBtn">🖼️ Logo Değiştir</button>
                <button class="admin-btn" id="resetLogoBtn">🔄 Logo Sıfırla</button>
                <button class="admin-btn" id="editPageContentBtn" style="background:#f5b042;color:#1e1e1e;">🖊️ Sayfa İçeriğini Düzenle</button>`;
            if (pid === "drama") {
                btns += `<button class="admin-btn" id="dramaAddPageText">📄 Tanıtım Metni Ekle</button>
                         <button class="admin-btn" id="dramaAddArticle">📝 Makale Ekle</button>
                         <button class="admin-btn" id="dramaAddReference">🏫 Referans Ekle</button>
                         <button class="admin-btn" id="dramaAddInsta">📸 Instagram Video Ekle</button>`;
            } else {
                btns += `<button class="admin-btn danger" id="clearPageBtn">🗑️ Sayfa İçeriğini Sil</button>`;
            }
            btns += `<button class="admin-btn" id="changePasswordBtn">🔐 Şifre Değiştir</button>
                     <button class="admin-btn" id="exitAdminBtn">🚪 Çıkış</button></div>`;
            adiv.innerHTML = btns;
            adiv.style.display = "block";
            
            document.getElementById("changeLogoBtn").onclick = changeLogo;
            document.getElementById("resetLogoBtn").onclick = resetLogo;
            document.getElementById("editPageContentBtn").onclick = openEditor;
            if (pid === "drama") {
                document.getElementById("dramaAddPageText").onclick = addPageText;
                document.getElementById("dramaAddArticle").onclick = addArticle;
                document.getElementById("dramaAddReference").onclick = addReference;
                document.getElementById("dramaAddInsta").onclick = addInstaVideo;
            } else {
                if(document.getElementById("clearPageBtn")) document.getElementById("clearPageBtn").onclick = clearPage;
            }
            document.getElementById("changePasswordBtn").onclick = changeAdminPassword;
            document.getElementById("exitAdminBtn").onclick = () => { adminMode = false; renderPage(); };
        } else {
            adiv.style.display = "none";
        }
    }

    function buildMenu() { const ul = document.getElementById("nav-list"); ul.innerHTML = ""; pages.forEach(p => { const btn = document.createElement("button"); btn.textContent = p.title; if (siteData.currentPage === p.id) btn.classList.add("active"); btn.onclick = () => { siteData.currentPage = p.id; saveData(true); buildMenu(); renderPage(); }; ul.appendChild(btn); }); }

    // --- YENİ RİTMİK ŞİFRE MEKANİZMASI ---
    let rhythmPattern = ""; 
    let pressStartTime = 0;
    let rhythmTimer;

    const trigger = document.getElementById("secret-login-trigger");

    trigger.addEventListener("mousedown", () => {
        pressStartTime = Date.now();
        clearTimeout(rhythmTimer);
    });

    trigger.addEventListener("mouseup", () => {
        const pressDuration = Date.now() - pressStartTime;
        const type = (pressDuration > 1000) ? "U" : "K"; 
        
        rhythmPattern += type;
        
        if (rhythmPattern === "KKKKKUKK") {
            const pass = prompt("Yönetici şifresi:");
            if (pass && checkPassword(pass)) {
                adminMode = true;
                renderPage();
            } else if (pass !== null) {
                alert("Şifre yanlış!");
            }
            rhythmPattern = ""; 
        }

        rhythmTimer = setTimeout(() => {
            rhythmPattern = "";
        }, 2000);
    });

    // Mobil uyumluluk için
    trigger.addEventListener("touchstart", (e) => { 
        pressStartTime = Date.now(); 
        clearTimeout(rhythmTimer); 
    });
    trigger.addEventListener("touchend", (e) => { 
        trigger.dispatchEvent(new Event('mouseup')); 
    });

    loadLogo(); loadData(); loadDramaData(); buildMenu(); renderPage();
    window.editSectionTitle = editSectionTitle; window.deletePageText = deletePageText; window.deleteArticle = deleteArticle; window.deleteReference = deleteReference; window.deleteInstaVideo = deleteInstaVideo; window.createLink = createLink; window.closeEditor = closeEditor; window.addPageText = addPageText; window.addArticle = addArticle; window.addReference = addReference; window.addInstaVideo = addInstaVideo;
})();
</script>
</body>
</html>
