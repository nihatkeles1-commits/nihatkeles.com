<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihat Keleş | Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; font-family: system-ui, -apple-system, sans-serif; color: #f0f0f0; line-height: 1.6; padding: 1rem; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; border-radius: 28px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { background: #2a2a2a; padding: 1.5rem 2rem; border-bottom: 3px solid #f5b042; }
        .header-brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 2rem; }
        .header-logo { width: 180px; height: auto; border-radius: 10px; }
        header h1 { font-size: 2rem; letter-spacing: 1px; margin: 0; }
        header h1 span { color: #f5b042; }
        
        nav { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        nav button { background: #3a3a3a; border: none; color: white; padding: 0.6rem 1.2rem; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        nav button:hover { background: #555; }
        nav button.active { background: #f5b042; color: #121212; font-weight: bold; }
        
        main { padding: 2rem; }
        .section-content { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { color: #f5b042; margin-bottom: 1.5rem; border-left: 4px solid #f5b042; padding-left: 1rem; }
        p { margin-bottom: 1rem; color: #ccc; }

        /* SAHNE - USTALARA SAYGI TASARIMI (YATAY VE PRESTİJLİ) */
        .vefa-bolumu { background-color: #2a2a2a; padding: 3rem 1.5rem; border-radius: 20px; margin-top: 2rem; border: 1px solid #333; }
        .vefa-ust-metin { text-align: center; max-width: 800px; margin: 0 auto 3rem auto; }
        .vefa-ust-metin h3 { color: #f5b042; font-size: 1.8rem; margin-bottom: 15px; font-family: serif; letter-spacing: 1px; }
        .vefa-ust-metin p { font-style: italic; font-size: 1rem; color: #bbb; line-height: 1.6; }
        
        .vefa-izgara { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2rem; align-items: start; }
        .vefa-kategori h4 { color: #f5b042; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 8px; opacity: 0.8; }
        .vefa-liste { list-style: none; padding: 0; }
        .vefa-liste li { color: #eee; font-size: 0.95rem; margin-bottom: 8px; font-weight: 500; }

        .accordion { background: #2a2a2a; margin-bottom: 0.5rem; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        summary { padding: 1rem; cursor: pointer; font-weight: bold; list-style: none; }
        summary:hover { background: #333; }
        .accordion-inner { padding: 1rem; background: #1e1e1e; border-top: 1px solid #333; }
        
        .contact-box { background: #2a2a2a; padding: 2rem; border-radius: 20px; text-align: center; }
        .contact-box a { color: #f5b042; text-decoration: none; font-weight: bold; }
        
        @media (max-width: 600px) {
            .header-brand { flex-direction: column; text-align: center; }
            .vefa-izgara { grid-template-columns: 1fr; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-brand">
            <h1>NİHAT <span>KELEŞ</span></h1>
            <img src="logo.png" alt="Nihat Keleş Logo" class="header-logo" onerror="this.style.display='none'">
        </div>
        <nav id="nav-list"></nav>
    </header>

    <main id="page-content"></main>
</div>

<script>
    const dramaData = [
        {
            baslik: "🎭 Kurumsal Drama Eğitimi",
            icerik: "<p>Şirket içi iletişimi güçlendirmek ve çalışan motivasyonunu artırmak adına özgün drama teknikleri uyguluyorum.</p>"
        },
        {
            baslik: "📚 Eğitim Koordinatörlüğü",
            icerik: "<p>Eğitim programlarının yapılandırılması ve müfredat geliştirme süreçlerini profesyonel bir disiplinle yönetiyorum.</p>"
        },
        {
            baslik: "✍️ Editörlük ve Danışmanlık",
            icerik: "<ul><li>Senaryo ve metin analizi süreçlerinde akademik bir derinlikle çalışıyorum.</li><li>Yayıncılık dünyasındaki tecrübelerimle eserlerin yapısal dönüşümünü gerçekleştiriyorum.</li></ul>"
        },
        {
            baslik: "📸 Süreç Anlatımları",
            icerik: "<p>Yaratıcı drama süreçlerini ve atölye metodolojimi animasyon destekli videolarla anlatıyor; eğitimin dijital dille buluşmasını sağlıyorum.</p>"
        }
    ];

    const sayfalar = {
        anasayfa: {
            baslik: "ANA SAYFA",
            icerik: `
                <div class="section-content">
                    <h2>Hoş Geldiniz</h2>
                    <p>İşletme, çocuk gelişimi ve tiyatro disiplinlerini birleştiren bir profesyonel olarak; senaristlik, drama öğretmenliği ve yazarlık alanlarında çalışmalarımı sürdürüyorum.</p>
                    <p>Bilgi kaosundan uzak, samimiyet ve disiplin odaklı bir üretim sürecini benimsiyorum. Araştırma ve akademik makale yazımı tutkumla eğitim koordinatörlüğü görevlerimi harmanlıyorum.</p>
                </div>
            `
        },
        drama: {
            baslik: "DRAMA HOCAM",
            icerik: "" // Dinamik render edilecek
        },
        yazarlik: {
            baslik: "YAZARLIK",
            icerik: `
                <div class="section-content">
                    <h2>Yazarlık & Senaristlik</h2>
                    <p>Yayınlanmış romanlarım ve Devlet Tiyatroları repertuvarına kabul edilmiş oyunlarımla hikaye anlatıcılığını farklı platformlarda sürdürüyorum.</p>
                    <p>Editörlük ve senaryo danışmanlığı süreçlerinde, metnin özüne sadık kalarak yapısal iyileştirmeler gerçekleştiriyorum.</p>
                </div>
            `
        },
        sahne: {
            baslik: "SAHNE",
            icerik: `
                <div class="section-content">
                    <h2>SAHNE SANATLARI</h2>
                    <p>Oyunculuk ve sahne disiplini, sanat yolculuğumun en temel taşlarından biridir. Sahne üzerindeki varlığımı, köklü bir eğitim geleneği üzerine inşa ettim.</p>

                    <div class="vefa-bolumu">
                        <div class="vefa-ust-metin">
                            <h3>USTALARA SAYGI VE MİNNETLE</h3>
                            <p>Sanata, sahneye ve eğitime bakışımda iz bırakan; düşünce dünyamı, sahne disiplinimi ve anlatım dilimi etkileyen kıymetli hocalarımı saygı ve minnetle anıyorum.</p>
                        </div>

                        <div class="vefa-izgara">
                            <div class="vefa-kategori">
                                <h4>Bakış Açısı & Düşünce</h4>
                                <ul class="vefa-liste">
                                    <li>Emre Kongar</li><li>Sunay Akın</li><li>Toktamış Ateş</li><li>Sevin Okyay</li><li>Burçak Evren</li>
                                </ul>
                            </div>
                            <div class="vefa-kategori">
                                <h4>Sahne & Seyirci Bağı</h4>
                                <ul class="vefa-liste">
                                    <li>Haldun Dormen</li><li>Aliye Uzunatağan</li><li>Göksel Kortay</li><li>Mustafa Alabora</li><li>Can Doğan</li><li>Şebnem Sönmez</li><li>Hilmi Zafer Şahin</li><li>Nefrin Tokyay</li>
                                </ul>
                            </div>
                            <div class="vefa-kategori">
                                <h4>Geleneksel Birikim</h4>
                                <ul class="vefa-liste">
                                    <li>Müjdat Gezen</li><li>Zihni Göktay</li><li>Savaş Dinçel</li><li>Mücap Ofluoğlu</li>
                                </ul>
                            </div>
                            <div class="vefa-kategori">
                                <h4>Sinema & Dramaturji</h4>
                                <ul class="vefa-liste">
                                    <li>Tuncer Cücenoğlu</li><li>Sezai Gülşen</li><li>Muzaffer Hiçdurmaz</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },
        iletisim: {
            baslik: "İLETİŞİM",
            icerik: `
                <div class="section-content">
                    <h2>İletişim</h2>
                    <div class="contact-box">
                        <p>Projeleriniz veya iş birlikleri için bana ulaşabilirsiniz.</p>
                        <p>E-posta: <a href="mailto:info@nihatkeles.com">info@nihatkeles.com</a></p>
                    </div>
                </div>
            `
        }
    };

    let currentPage = "anasayfa";

    function render() {
        const contentArea = document.getElementById("page-content");
        const navList = document.getElementById("nav-list");
        const menuler = [
            {id: "anasayfa", ad: "ANA SAYFA"},
            {id: "drama", ad: "DRAMA HOCAM"},
            {id: "yazarlik", ad: "YAZARLIK"},
            {id: "sahne", ad: "SAHNE"},
            {id: "iletisim", ad: "İLETİŞİM"}
        ];

        navList.innerHTML = "";
        menuler.forEach(m => {
            const btn = document.createElement("button");
            btn.textContent = m.ad;
            if(currentPage === m.id) btn.classList.add("active");
            btn.onclick = () => { currentPage = m.id; render(); };
            navList.appendChild(btn);
        });

        if (currentPage === "drama") {
            let html = "<h2>DRAMA HOCAM</h2>";
            dramaData.forEach(item => {
                html += `<details class="accordion"><summary>${item.baslik}</summary><div class="accordion-inner">${item.icerik}</div></details>`;
            });
            contentArea.innerHTML = `<div class="section-content">${html}</div>`;
        } else {
            contentArea.innerHTML = sayfalar[currentPage].icerik;
        }
        window.scrollTo(0, 0);
    }

    render();
</script>
</body>
</html>
