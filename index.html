<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="favicon.png?v=2026.1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihat Keleş | Drama Hocam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; font-family: system-ui, sans-serif; color: #f0f0f0; line-height: 1.6; padding: 1rem; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; border-radius: 28px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { background: #2a2a2a; padding: 1.5rem 2rem; border-bottom: 3px solid #f5b042; }
        .header-brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .header-logo { width: 180px; height: auto; border-radius: 10px; }
        header h1 { font-size: 2rem; }
        header h1 span { color: #f5b042; }
        nav ul { display: flex; flex-wrap: wrap; gap: 10px; list-style: none; }
        nav button { background: #333; border: none; color: white; padding: 0.7rem 1.4rem; border-radius: 40px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        nav button.active { background: #f5b042; color: #1e1e1e; }
        main { padding: 2.5rem; min-height: 50vh; }
        .content-body h2 { color: #f5b042; margin-bottom: 1rem; border-left: 4px solid #f5b042; padding-left: 1rem; }
        .content-body p { margin-bottom: 1rem; font-size: 1.1rem; color: #ccc; }
        details.accordion { background: #252525; margin-bottom: 1rem; border-radius: 12px; border: 1px solid #333; }
        details.accordion summary { padding: 1rem; cursor: pointer; color: #f5b042; font-weight: bold; }
        .accordion-content { padding: 1rem; border-top: 1px solid #333; }
        footer { text-align: center; padding: 2rem; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-brand">
            <img class="header-logo" src="logo.png" alt="Logo">
            <h1>NİHAT <span>KELEŞ</span></h1>
        </div>
        <nav><ul id="nav-list"></ul></nav>
    </header>
    <main id="page-content" class="content-body"></main>
    <footer>&copy; 2026 Nihat Keleş</footer>
</div>

<script>
    // --- GİTHUB ÜZERİNDEN DÜZENLEYECEĞİNİZ ALAN BURASI ---
    
    // Ana Sayfalar ve İçerikleri
    const siteData = {
        anasayfa: `
            <h2>HAKKINDA</h2>
            <p>İşletme, çocuk gelişimi ve Tiyatro lisanslarına sahibim. Profesyonel olarak senaristlik, editörlük ve drama öğretmenliği yapıyorum.</p>
            <p>Disiplinli çalışmayı ve gerçek bilgiyi her şeyin önünde tutarım.</p>
        `,
        yazarlik: `
            <h2>YAZARLIK</h2>
            <p>Yayınlanmış romanlarım ve devlet tiyatrolarında sergilenmiş oyunlarım bulunmaktadır.</p>
        `,
        sahne: `
            <h2>SAHNE</h2>
            <p>Tiyatro ve sahne sanatları üzerine akademik çalışmalar ve uygulamalı eğitimler.</p>
        `,
        iletisim: `
            <h2>İLETİŞİM</h2>
            <p>E-posta: info@drama-hocam.com</p>
        `
    };

    // "Drama Hocam" Sayfasına Özel Akordiyon İçerikleri
    const dramaData = [
        { baslik: "🔍 Çalışma Modelim", icerik: "Çocuk gelişimi odaklı drama metodolojisi..." },
        { baslik: "📖 Makaleler", icerik: "Akademik araştırmalar ve yayınlanmış makaleler listesi..." },
        { baslik: "🏫 Referanslar", icerik: "Eğitim verilen kurumlar ve projeler..." },
        { baslik: "📸 Videolar", icerik: "Eğitimlerden kesitler ve uygulamalı drama örnekleri..." }
    ];

    // --- SİSTEM MOTORU (DOKUNMANIZA GEREK YOK) ---

    let currentPage = "anasayfa";

    function render() {
        const contentArea = document.getElementById("page-content");
        
        // Menüyü oluştur
        const navList = document.getElementById("nav-list");
        navList.innerHTML = "";
        const menuler = [
            {id: "anasayfa", ad: "ANA SAYFA"},
            {id: "drama", ad: "DRAMA HOCAM"},
            {id: "yazarlik", ad: "YAZARLIK"},
            {id: "sahne", ad: "SAHNE"},
            {id: "iletisim", ad: "İLETİŞİM"}
        ];

        menuler.forEach(m => {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.textContent = m.ad;
            if(currentPage === m.id) btn.classList.add("active");
            btn.onclick = () => { currentPage = m.id; render(); };
            li.appendChild(btn);
            navList.appendChild(li);
        });

        // İçeriği oluştur
        if (currentPage === "drama") {
            let dramaHtml = "<h2>DRAMA HOCAM</h2>";
            dramaData.forEach(item => {
                dramaHtml += `
                    <details class="accordion">
                        <summary>${item.baslik}</summary>
                        <div class="accordion-content">${item.icerik}</div>
                    </details>`;
            });
            contentArea.innerHTML = dramaHtml;
        } else {
            contentArea.innerHTML = siteData[currentPage] || "İçerik hazırlanıyor...";
        }
    }

    // İlk açılışta çalıştır
    render();
</script>
</body>
</html>
