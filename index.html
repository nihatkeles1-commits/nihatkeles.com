<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="favicon.png?v=2026">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihat Keleş | Tam Metin Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            padding: 1rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header {
            background: #2a2a2a;
            padding: 1.5rem 2rem;
            border-bottom: 3px solid #f5b042;
        }
        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 2rem;
        }
        .header-logo { width: 180px; height: auto; border-radius: 10px; }
        header h1 { font-size: 2rem; letter-spacing: 1px; margin: 0; }
        header h1 span { color: #f5b042; }
        
        nav ul { display: flex; flex-wrap: wrap; gap: 0.6rem; list-style: none; }
        nav button {
            background: #333;
            border: none;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        nav button.active, nav button:hover { background: #f5b042; color: #1e1e1e; }

        main { padding: 2.5rem; min-height: 55vh; }
        .content-body h2 {
            color: #f5b042;
            border-left: 5px solid #f5b042;
            padding-left: 1rem;
            margin: 1.5rem 0 1rem;
        }
        .content-body h3 { color: #f5b042; margin: 1.5rem 0 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .content-body p { margin-bottom: 1.2rem; color: #ccc; text-align: justify; }
        .content-body ul { margin-left: 1.5rem; margin-bottom: 1.5rem; color: #ccc; }
        .content-body li { margin-bottom: 0.7rem; }
        
        details.accordion { background: #252525; margin: 1rem 0; border-radius: 12px; border: 1px solid #3a3a3a; }
        details.accordion summary { padding: 1.2rem; cursor: pointer; font-weight: bold; color: #f5b042; list-style: none; display: flex; justify-content: space-between; }
        details.accordion summary::after { content: "▼"; font-size: 0.8rem; opacity: 0.7; }
        details.accordion[open] summary::after { content: "▲"; }
        .accordion-inner { padding: 1.5rem; border-top: 1px solid #3a3a3a; background: #1e1e1e; }
        
        .contact-link { color: #f5b042; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 2rem; background: #2a2a2a; color: #666; font-size: 0.8rem; }

        @media (max-width: 700px) {
            .header-brand { flex-direction: column; text-align: center; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-brand">
            <h1>NİHAT <span>KELEŞ</span></h1>
            <img src="logo.png" alt="Logo" class="header-logo">
        </div>
        <nav><ul id="nav-list"></ul></nav>
    </header>
    <main id="page-content" class="content-body"></main>
    <footer>&copy; 2026 Nihat Keleş</footer>
</div>

<script>
    const siteData = {
        anasayfa: `

        `,
        yazarlik: `

            <p><strong>Hikaye Tasarımından Sahne Uygulamasına</strong></p>
            <p><em>"Sadece kağıt üzerinde kalan değil, sahne ışığıyla veya kamera vizörüyle buluştuğunda yaşayan metinler üzerine odaklanıyorum."[cite: 4]</em></p>
            <h3>Üretim Alanları</h3>
            <ul>
                <li><strong>Dramatik Yazarlık:</strong> Devlet Tiyatroları repertuvarına kabul edilmiş oyunlar ve çocuk müzikalleri[cite: 4].</li>

                <li><strong>Edebiyat:</strong> Gençlik ve Çocuk Romanları[cite: 4].</li>
                <li><strong>Kurumsal Yazarlık:</strong> Kamu kurumları ve özel teşebbüsler için stratejik metin üretimi ve editörlük[cite: 4].</li>
            </ul>
            <h3>Yazım Yaklaşımı</h3>
            <p>Bir metni inşa ederken üç temel kriteri önceliklendiriyorum[cite: 4]:</p>
            <ul>
                <li><strong>Uygulanabilirlik:</strong> Sahne veya çekim matematiğine uygun, teknik olarak uygulanabilir kurgular[cite: 4].</li>
                <li><strong>Hedef Kitle Algısı:</strong> Çocuk oyununda pedagojik hassasiyet, reklamda pazarlama dili, dramada ise karakter derinliği[cite: 4].</li>
                <li><strong>Dinamik Dil:</strong> Bilgi kaosundan uzak, akıcı ve izleyiciyi/okuru hikayenin içinde tutan yalın bir anlatım[cite: 4].</li>
            </ul>
            <h3>Öne Çıkan Deneyimler</h3>
            <ul>
                <li><strong>Devlet Tiyatroları:</strong> 60. yıla özel çocuk oyunlarından birine editöryal destek. Repertuvara kazandırılan oyunlar. Müzikal Çocuk Oyunu[cite: 4].</li>
                <li><strong>Kamu Kurumları:</strong> Kültür Bakanlığı / Dış İşleri Bakanlığı / Türk Tarih Kurumu : Senaryo geliştirme destekleri ve kamu projeleri metin yazarlığı[cite: 4].</li>
                <li><strong>Medya & Editörlük:</strong> Ulusal kanallarda ve yapım firmalarında senaryo danışmanlığı ve içerik yönetimi[cite: 4].</li>
            </ul>
        `,
        sahne: `
            <h2>SAHNE</h2>
            <p>Sahne kökenli bir drama eğitmeni olarak, profesyonel tiyatro deneyimimi sınıf ortamına taşıyorum. Devlet ve özel tiyatrolarda aktif oyunculuk geçmişim, uygulamalı ve disiplinli bir eğitim modeli sunmamı sağlar[cite: 4].</p>
            <p>Sahne disiplini ve kolektif üretim gücüyle şekillenen bir eğitmenlik vizyonu. Profesyonel tiyatro deneyiminin eğitimle buluştuğu noktada, sahne sanatlarının disiplini çocuk gelişiminin en büyük destekçisidir[cite: 3, 4].</p>
        `,
        iletisim: `
            <h2>İLETİŞİM</h2>
            <p><strong>Telefon:</strong> +90 530 558 86 50[cite: 4]</p>
            <p><strong>Instagram:</strong> <a href="https://www.instagram.com/dramahocam/" target="_blank" class="contact-link">@dramahocam</a>[cite: 4]</p>
            <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/nihat-keles-b3492523/" target="_blank" class="contact-link">Nihat Keleş Profile</a></p>
        `
    };

    const dramaData = [
        {
            baslik: "🔍 Çalışma Modelim (Tam Metin)",
            icerik: `
                <h3>Çocuk Gelişimi Odaklı Yaratıcı Drama</h3>
                <p>İlkokul düzeyinde, çocuk gelişimi ilkelerini temel alan yapılandırılmış yaratıcı drama çalışmaları yürütüyorum. Temel amacım; çocuğun ifade gücünü, sosyal uyum becerisini ve eleştirel düşünme yetisini sahne pratiğiyle somutlaştırmaktır[cite: 4].</p>
                <p><strong>Nasıl Çalışıyorum?</strong> Eğitimler, akademik bir metodolojiye dayanan ve sınıf içi dinamiklere tam uyum sağlayan bir sistem üzerine kurulur[cite: 4]:</p>
                <ul>
                    <li><strong>Oyunlaştırılmış Öğrenme:</strong> Bilgiyi ezberden çıkarıp deneyime dönüştürme[cite: 4].</li>
                    <li><strong>Etkileşimli Rol Alma:</strong> Grup içi iş birliği ve empati geliştirme[cite: 4].</li>
                    <li><strong>Duygusal Zeka (EQ):</strong> Duygu yönetimi ve özgüven odaklı uygulamalar[cite: 4].</li>
                </ul>
            `
        },
        {
            baslik: "📖 Uygulama Modeli & Sütunlar",
            icerik: `
                <p>Çeyrek asırlık saha deneyimiyle rafine edilen bu yaklaşım üç ana sütuna dayanır[cite: 4]:</p>
                <ul>
                    <li><strong>Disiplinlerarası Geçiş:</strong> Tiyatro pratiğinin çocuk gelişimi pedagojisiyle eş zamanlı kullanımı[cite: 4].</li>
                    <li><strong>Yapılandırılmış Kurgu:</strong> Sınıf ortamına özel, müfredatla uyumlu drama senaryoları[cite: 4].</li>
                    <li><strong>İletişim Becerileri:</strong> Hitabet, artikülasyon ve diksiyon çalışmalarının drama sürecine doğal entegrasyonu[cite: 4].</li>
                </ul>
            `
        },
        {
            baslik: "🏫 Hizmet Alanları & İş Birlikleri",
            icerik: `
                <ul>
                    <li><strong>Kurumlar:</strong> İlkokullar, anaokulları ve butik eğitim merkezleri[cite: 4].</li>
                    <li><strong>Eğitimciler:</strong> Öğretmen eğitimleri ve eğitim koordinatörlüğü danışmanlığı[cite: 4].</li>
                    <li><strong>Projeler:</strong> Okul içi program tasarımı ve çocuk müzikali/tiyatrosu prodüksiyonları[cite: 4].</li>
                </ul>
                <p><strong>Neden 25 Yıl?</strong> Bu süreç; sadece bir eğitmenlik değil, on binin üzerinde çocukla birlikte üretilmiş kesintisiz bir saha araştırmasıdır[cite: 4].</p>
                <p><strong>Kurumsal Destekler:</strong> Devlet Tiyatroları, Kültür Bakanlığı, Dış İşleri Bakanlığı, Türk Tarih Kurumu ve çeşitli yapım firmaları ile senaryo ve içerik yönetimi iş birlikleri[cite: 4].</p>
            `
        },
        {
            baslik: "📸 Uygulama Kesitleri",
            icerik: `
                <p>Uygulamalı drama çalışmaları ve atölye süreçlerinden örnekleri Instagram üzerinden inceleyebilirsiniz[cite: 4].</p>
                <p><a href="https://www.instagram.com/dramahocam/" target="_blank" class="contact-link">@dramahocam Instagram Profilini Ziyaret Et</a></p>
            `
        }
    ];

    let currentPage = "anasayfa";

    function render() {
        const contentArea = document.getElementById("page-content");
        const navList = document.getElementById("nav-list");
        const menuler = [
            {id: "anasayfa", ad: "ANA SAYFA"},
            {id: "drama", ad: "DRAMA HOCAM"},
            {id: "yazarlik", ad: "YAZARLIK"},
            {id: "sahne", ad: "SAHNE"},
            {id: "iletisim", ad: "İLETİŞİM"}
        ];

        navList.innerHTML = "";
        menuler.forEach(m => {
            const btn = document.createElement("button");
            btn.textContent = m.ad;
            if(currentPage === m.id) btn.classList.add("active");
            btn.onclick = () => { currentPage = m.id; render(); };
            navList.appendChild(btn);
        });

        if (currentPage === "drama") {
            let html = "<h2>DRAMA HOCAM</h2>";
            dramaData.forEach(item => {
                html += `
                    <details class="accordion">
                        <summary>${item.baslik}</summary>
                        <div class="accordion-inner">${item.icerik}</div>
                    </details>`;
            });
            contentArea.innerHTML = html;
        } else {
            contentArea.innerHTML = siteData[currentPage] || "İçerik yükleniyor...";
        }
        window.scrollTo(0,0);
    }
    render();
</script>
</body>
</html>
